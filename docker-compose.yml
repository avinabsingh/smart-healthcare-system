version: "3"

services:
  mongo:
    image: mongo
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    env_file:
      - ./backend/.env # ✅ FIXED (moved inside backend)

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
